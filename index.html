<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Performance Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, onSnapshot, collection, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCNreodiUOaSm4LkM3nsL3uTotYGnpHQoI",
  authDomain: "dashboard-flobar.firebaseapp.com",
  projectId: "dashboard-flobar",
  storageBucket: "dashboard-flobar.firebasestorage.app",
  messagingSenderId: "411809018757",
  appId: "1:411809018757:web:ae0d7cbf7d3e054b82caec",
  measurementId: "G-M3G8ENZPW8"
};

const ADMIN_EMAIL = 'clusternusra@gmail.com';

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── expose to window so non-module scripts can use ──
window._fb = { auth, db, doc, setDoc, onSnapshot, collection, serverTimestamp,
               GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, ADMIN_EMAIL };
</script>
<style>
  :root {
    --bg: #0a0d14;
    --surface: #111520;
    --surface2: #161c2a;
    --border: #1e2842;
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --accent3: #8b5cf6;
    --gold: #f59e0b;
    --green: #10b981;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --tag-color: #06b6d4;
    --bio-color: #8b5cf6;
    --seru-color: #f59e0b;
    --cvm-color: #10b981;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700;
  }
  .header h1 { font-size: 1.1rem; font-weight: 600; color: #fff; letter-spacing: -.5px; }
  .header-sub { font-size: 0.72rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .upload-btn {
    display: flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, var(--accent), #1d4ed8);
    border: none; color: #fff; padding: 9px 18px;
    border-radius: 8px; cursor: pointer; font-family: 'Space Grotesk', sans-serif;
    font-size: 0.82rem; font-weight: 600; transition: all .2s;
    box-shadow: 0 0 16px rgba(59,130,246,0.3);
  }
  .upload-btn:hover { transform: translateY(-1px); box-shadow: 0 0 24px rgba(59,130,246,0.5); }
  #fileInput { display: none; }

  /* MAIN LAYOUT */
  .main { display: flex; gap: 0; min-height: calc(100vh - 65px); }

  /* SIDEBAR */
  .sidebar {
    width: 260px; min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 18px 0;
    overflow-y: auto;
  }
  .sidebar-title {
    font-size: 0.65rem; font-weight: 700; letter-spacing: 2px;
    color: var(--muted); text-transform: uppercase;
    padding: 0 18px 10px;
  }
  .mc-group { margin-bottom: 6px; }
  .mc-btn {
    width: 100%; text-align: left;
    background: none; border: none; color: var(--text);
    padding: 10px 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    font-family: 'Space Grotesk', sans-serif; font-size: 0.82rem; font-weight: 600;
    border-left: 3px solid transparent;
    transition: all .15s;
  }
  .mc-btn:hover { background: var(--surface2); color: var(--accent2); }
  .mc-btn.active { border-left-color: var(--accent); background: rgba(59,130,246,0.08); color: var(--accent2); }
  .mc-badge {
    font-size: 0.68rem; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 2px 8px; color: var(--muted); font-family: 'JetBrains Mono', monospace;
  }
  .mc-btn.active .mc-badge { background: rgba(59,130,246,0.15); color: var(--accent); border-color: rgba(59,130,246,0.3); }

  /* BRANCH TOTAL BUTTON */
  .branch-btn {
    width: 100%; text-align: left;
    background: linear-gradient(135deg, rgba(245,158,11,0.12), rgba(245,158,11,0.04));
    border: none; border-left: 3px solid transparent;
    color: var(--gold); padding: 11px 18px; cursor: pointer;
    font-family: 'Space Grotesk', sans-serif; font-size: 0.82rem; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
    transition: all .15s; margin-bottom: 8px;
  }
  .branch-btn:hover { background: rgba(245,158,11,0.18); }
  .branch-btn.active { border-left-color: var(--gold); background: rgba(245,158,11,0.18); }
  .branch-divider { height: 1px; background: var(--border); margin: 0 18px 10px; }

  /* MC COMPARISON TABLE */
  .mc-compare-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
  .mc-compare-table th {
    padding: 10px 14px; text-align: left;
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); background: var(--surface2); font-weight: 600; white-space: nowrap;
  }
  .mc-compare-table td { padding: 10px 14px; border-bottom: 1px solid rgba(30,40,66,0.5); }
  .mc-compare-table tr:hover td { background: var(--surface2); cursor: pointer; }
  .mc-compare-table tr.total-row td {
    background: rgba(245,158,11,0.08); color: var(--gold); font-weight: 700;
    border-top: 2px solid rgba(245,158,11,0.3); border-bottom: none;
  }
  .mc-name-cell { font-weight: 600; color: var(--accent2); }
  .dse-list { padding: 4px 0 4px 14px; }
  .dse-btn {
    width: 100%; text-align: left; background: none; border: none;
    color: var(--muted); padding: 7px 18px; cursor: pointer;
    font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
    border-left: 2px solid transparent; transition: all .15s;
    display: flex; align-items: center; gap: 6px;
  }
  .dse-btn::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .dse-btn:hover { color: var(--text); background: var(--surface2); }
  .dse-btn.active { color: var(--accent2); border-left-color: var(--accent2); background: rgba(6,182,212,0.06); }
  .dse-btn.active::before { background: var(--accent2); }

  /* CONTENT */
  .content { flex: 1; padding: 24px; overflow-y: auto; }

  /* BREADCRUMB */
  .breadcrumb {
    font-size: 0.72rem; color: var(--muted); margin-bottom: 20px;
    font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; gap: 6px;
  }
  .breadcrumb span { color: var(--muted); }
  .breadcrumb .active-crumb { color: var(--accent2); }

  /* KPI CARDS */
  .kpi-section { margin-bottom: 28px; }
  .section-label {
    font-size: 0.65rem; font-weight: 700; letter-spacing: 2px;
    color: var(--muted); text-transform: uppercase; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .kpi-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px;
    position: relative; overflow: hidden;
    transition: transform .2s, box-shadow .2s;
  }
  .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .kpi-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
  }
  .kpi-card.salmo::before { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .kpi-card.sellin::before { background: linear-gradient(90deg, var(--accent3), #ec4899); }
  .kpi-card.ga::before { background: linear-gradient(90deg, var(--green), #86efac); }
  .kpi-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .kpi-value { font-size: 1.6rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; line-height: 1; }
  .kpi-card.salmo .kpi-value { color: var(--accent2); }
  .kpi-card.sellin .kpi-value { color: #c084fc; }
  .kpi-card.ga .kpi-value { color: var(--green); }
  .kpi-delta {
    margin-top: 10px; font-size: 0.72rem;
    font-family: 'JetBrains Mono', monospace;
    display: flex; align-items: center; gap: 4px;
  }
  .delta-up { color: var(--green); }
  .delta-down { color: var(--red); }
  .kpi-sub { color: var(--muted); }

  /* PROGRAM SECTION */
  .program-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
  .prog-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px 18px;
    position: relative; overflow: hidden;
    transition: transform .2s;
  }
  .prog-card:hover { transform: translateY(-2px); }
  .prog-card::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0;
    height: 3px; border-radius: 0 0 14px 14px;
  }
  .prog-card.tag::after { background: var(--tag-color); }
  .prog-card.bio::after { background: var(--bio-color); }
  .prog-card.seru::after { background: var(--seru-color); }
  .prog-card.cvm::after { background: var(--cvm-color); }
  .prog-icon { font-size: 1.3rem; margin-bottom: 8px; }
  .prog-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .prog-card.tag .prog-label { color: var(--tag-color); }
  .prog-card.bio .prog-label { color: var(--bio-color); }
  .prog-card.seru .prog-label { color: var(--seru-color); }
  .prog-card.cvm .prog-label { color: var(--cvm-color); }
  .prog-value { font-size: 1.8rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .prog-card.tag .prog-value { color: var(--tag-color); }
  .prog-card.bio .prog-value { color: var(--bio-color); }
  .prog-card.seru .prog-value { color: var(--seru-color); }
  .prog-card.cvm .prog-value { color: var(--cvm-color); }
  .prog-sub { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }
  .prog-stat-row { display: flex; align-items: center; gap: 6px; margin: 6px 0 2px; }
  .prog-stat-item { font-size: 0.7rem; font-family: 'JetBrains Mono', monospace; }
  .prog-stat-pct { font-size: 0.68rem; font-weight: 700; padding: 2px 7px; border-radius: 20px; font-family: 'JetBrains Mono', monospace; }

  /* OUTLET TABLE */
  .table-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
  }
  .table-header {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .table-title { font-size: 0.82rem; font-weight: 600; }
  .table-count { font-size: 0.7rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
  thead th {
    padding: 10px 14px; text-align: left;
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); background: var(--surface2);
    font-weight: 600; white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid rgba(30,40,66,0.5); transition: background .1s; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 10px 14px; color: var(--text); font-size: 0.78rem; }
  tbody td.mono { font-family: 'JetBrains Mono', monospace; }
  tbody td.num { text-align: right; font-family: 'JetBrains Mono', monospace; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 6px;
    font-size: 0.65rem; font-weight: 600; font-family: 'JetBrains Mono', monospace;
  }
  .badge-tag { background: rgba(6,182,212,0.15); color: var(--tag-color); }
  .badge-bio { background: rgba(139,92,246,0.15); color: var(--bio-color); }
  .badge-seru { background: rgba(245,158,11,0.15); color: var(--seru-color); }
  .badge-cvm { background: rgba(16,185,129,0.15); color: var(--cvm-color); }
  .badge-zero { background: rgba(100,116,139,0.12); color: var(--muted); }

  /* SUMMARY PANEL (MC level when no DSE selected) */
  .dse-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .dse-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; cursor: pointer;
    transition: all .2s; position: relative;
  }
  .dse-card:hover { border-color: var(--accent2); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
  .dse-card-id { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--accent2); margin-bottom: 6px; }
  .dse-card-outlets { font-size: 0.68rem; color: var(--muted); margin-bottom: 10px; }
  .dse-mini-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .dse-mini-stat { background: var(--surface2); border-radius: 6px; padding: 5px 8px; }
  .dse-mini-label { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .dse-mini-val { font-size: 0.82rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--green); color: #fff;
    padding: 12px 20px; border-radius: 10px;
    font-size: 0.82rem; font-weight: 600;
    transform: translateY(80px); opacity: 0;
    transition: all .3s; z-index: 999;
    box-shadow: 0 8px 24px rgba(16,185,129,0.4);
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { background: var(--red); box-shadow: 0 8px 24px rgba(239,68,68,0.4); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* LOGIN OVERLAY */
  .login-overlay {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(10,13,20,0.96); backdrop-filter: blur(8px);
    align-items: center; justify-content: center; flex-direction: column; gap: 20px;
  }
  .login-overlay.show { display: flex; }
  .login-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 36px 40px; text-align: center;
    max-width: 340px; width: 90%;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
  }
  .login-logo { font-size: 2.5rem; margin-bottom: 12px; }
  .login-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
  .login-sub { font-size: 0.78rem; color: var(--muted); margin-bottom: 24px; }
  .google-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: #fff; color: #1f2937; border: none; border-radius: 10px;
    padding: 12px 20px; width: 100%; cursor: pointer; font-size: 0.88rem; font-weight: 600;
    font-family: 'Space Grotesk', sans-serif; transition: all .2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .google-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
  .google-btn img { width: 20px; height: 20px; }
  .login-cancel { font-size: 0.75rem; color: var(--muted); cursor: pointer; margin-top: 12px; }
  .login-cancel:hover { color: var(--text); }
  .login-err { font-size: 0.75rem; color: var(--red); margin-top: 8px; min-height: 18px; }

  /* ADMIN BADGE in header */
  .admin-badge {
    display: flex; align-items: center; gap: 8px;
    background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3);
    border-radius: 8px; padding: 6px 12px; font-size: 0.75rem; color: var(--green);
    font-weight: 600;
  }
  .admin-avatar { width: 22px; height: 22px; border-radius: 50%; }
  .admin-signout { cursor: pointer; color: var(--muted); font-size: 0.7rem; margin-left: 4px; }
  .admin-signout:hover { color: var(--red); }

  /* SYNC BADGE */
  .sync-badge {
    font-size: 0.65rem; font-family: 'JetBrains Mono', monospace;
    color: var(--muted); display: flex; align-items: center; gap: 4px;
  }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* DSE NAME IN SIDEBAR */
  .dse-btn-name { font-size: 0.72rem; color: var(--text); font-weight: 600; display: block; }
  .dse-btn-id { font-size: 0.65rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  /* SELLIN PROGRESS BAR */
  .sellin-prog-wrap { min-width: 120px; }
  .sellin-prog-label { display: flex; justify-content: space-between; font-size: 0.65rem; margin-bottom: 3px; font-family: 'JetBrains Mono', monospace; }
  .sellin-prog-bar { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .sellin-prog-fill { height: 100%; border-radius: 3px; transition: width .4s; }
  .prog-over { background: linear-gradient(90deg, #10b981, #34d399); }
  .prog-mid { background: linear-gradient(90deg, #f59e0b, #fcd34d); }
  .prog-low { background: linear-gradient(90deg, #ef4444, #f87171); }

  /* OSA CELL */
  .osa-val { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
  .osa-empty { color: var(--muted); font-size: 0.7rem; font-style: italic; }

  /* DONUT CHART */
  .donut-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 28px; }
  .donut-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px 14px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    transition: transform .2s;
  }
  .donut-card:hover { transform: translateY(-2px); }
  .donut-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); text-align: center; font-weight: 700; }
  .donut-wrap { position: relative; width: 120px; height: 120px; }
  .donut-wrap svg { transform: rotate(-90deg); }
  .donut-center {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    text-align: center; pointer-events: none;
  }
  .donut-pct { font-size: 1.15rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; line-height: 1; }
  .donut-label { font-size: 0.58rem; color: var(--muted); margin-top: 2px; }
  .donut-stats { width: 100%; display: flex; flex-direction: column; gap: 4px; }
  .donut-stat-row { display: flex; justify-content: space-between; font-size: 0.7rem; }
  .donut-stat-label { color: var(--muted); }
  .donut-stat-val { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
  .donut-sub { font-size: 0.65rem; color: var(--muted); text-align: center; border-top: 1px solid var(--border); padding-top: 8px; width: 100%; }

  /* OUTLET COUNT BAR */
  .outlet-bar-wrap { margin-top: 4px; }
  .outlet-bar-row { display: flex; justify-content: space-between; font-size: 0.65rem; margin-bottom: 3px; }
  .outlet-bar { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .outlet-bar-fill { height: 100%; border-radius: 2px; }

  @media (max-width: 768px) {
    /* Hide desktop sidebar */
    .sidebar { display: none; }
    /* Content full width with bottom padding for nav bar */
    .content { padding: 16px; padding-bottom: 90px; }
    /* Compact header */
    .header { padding: 12px 16px; }
    .header h1 { font-size: 0.9rem; }
    .header-sub { font-size: 0.65rem; }
    .logo { width: 32px; height: 32px; font-size: 15px; }
    .upload-btn { padding: 7px 12px; font-size: 0.75rem; }
    .admin-badge { padding: 5px 8px; font-size: 0.7rem; }
    /* Donut grid: 1 column on small screens */
    .donut-grid { grid-template-columns: 1fr; }
    .program-grid { grid-template-columns: 1fr 1fr; }
    .kpi-grid { grid-template-columns: 1fr 1fr; }
    .dse-grid { grid-template-columns: 1fr 1fr; }
    /* Toast above bottom nav */
    .toast { bottom: 80px; right: 12px; left: 12px; text-align: center; }
  }
  @media (max-width: 480px) {
    .donut-grid { grid-template-columns: 1fr; }

let DATA = [...EMBEDDED_DATA];

// ── UTILS ──────────────────────────────────────────────────────────────
const fmt = n => {
  if(n >= 1e9) return (n/1e9).toFixed(2)+'B';
  if(n >= 1e6) return (n/1e6).toFixed(2)+'M';
  if(n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return Math.round(n).toLocaleString('id');
};
const fmtFull = n => Math.round(n).toLocaleString('id-ID');
const delta = (cur, prev) => {
  if(!prev) return null;
  const pct = ((cur - prev) / prev * 100);
  return pct;
};

function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err?' error':'');
  setTimeout(()=>{ t.className = 'toast'; }, 3000);
}

// ── STATE ──────────────────────────────────────────────────────────────
let selectedMC = null;
let selectedDSE = null;
let viewBranch = false;

// ── BRANCH NAME ──────────────────────────────────────────────────────────
function getBranchName() {
  const b = DATA.find(r => r.branch && r.branch.trim());
  return b ? b.branch.trim() : 'Branch';
}

function updateHeaderSub() {
  const el = document.getElementById('headerSub');
  if(el) el.textContent = 'IM3 · ' + getBranchName();
}

// ── SIDEBAR ──────────────────────────────────────────────────────────────
function buildSidebar() {
  const mcs = [...new Set(DATA.map(r => r.micro_cluster))].sort();
  const branchName = getBranchName();
  const sb = document.getElementById('sidebar');
  let html = `<div class="sidebar-title">Micro Cluster</div>`;

  // Branch total button
  html += `<button class="branch-btn ${viewBranch?'active':''}" onclick="selectBranch()">
    🏢 ${branchName}
    <span class="mc-badge" style="color:var(--gold);border-color:rgba(245,158,11,0.3);background:rgba(245,158,11,0.1)">${mcs.length} MC</span>
  </button>
  <div class="branch-divider"></div>`;

  mcs.forEach(mc => {
    const dses = [...new Set(DATA.filter(r => r.micro_cluster===mc && r.dse_code && r.dse_code!=='UNASSIGNED').map(r=>r.dse_code))].sort();
    const outlets = DATA.filter(r => r.micro_cluster===mc).length;
    const isActiveMC = selectedMC === mc;

    html += `<div class="mc-group">
      <button class="mc-btn ${isActiveMC?'active':''}" onclick="selectMC('${mc}')">
        <span>${mc}</span>
        <span class="mc-badge">${dses.length} DSE</span>
      </button>`;

    if(isActiveMC) {
      html += `<div class="dse-list">`;
      dses.forEach(dse => {
        const isActiveDSE = selectedDSE === dse;
        const info = DSE_MAP[dse];
        const label = info && info.nama && info.nama !== 'nan'
          ? `<span class="dse-btn-name">${info.nama}</span><span class="dse-btn-id">${dse}</span>`
          : `<span class="dse-btn-name">${dse}</span>`;
        html += `<button class="dse-btn ${isActiveDSE?'active':''}" onclick="selectDSE('${dse}')" style="flex-direction:column;align-items:flex-start;gap:1px">${label}</button>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });

  sb.innerHTML = html;
}

function selectBranch() {
  viewBranch = true;
  selectedMC = null;
  selectedDSE = null;
  buildSidebar();
  renderContent();
  updateBottomNav();
}

function selectMC(mc) {
  viewBranch = false;
  selectedMC = mc;
  selectedDSE = null;
  buildSidebar();
  renderContent();
  updateBottomNav();
}

function selectDSE(dse) {
  selectedDSE = dse;
  buildSidebar();
  renderContent();
  updateBottomNav();
}

// ── RENDER ──────────────────────────────────────────────────────────────
function renderContent() {
  const ct = document.getElementById('content');

  if(viewBranch) {
    renderBranchTotal(ct);
  } else if(!selectedMC) {
    renderOverall(ct);
  } else if(!selectedDSE) {
    renderMCLevel(ct);
  } else {
    renderDSELevel(ct);
  }
}

function renderBranchTotal(ct) {
  updateHeaderSub();
  const branchName = getBranchName();
  const all = DATA;
  const s = sumFields(all);
  const mcs = [...new Set(DATA.map(r=>r.micro_cluster))].sort();
  const totalDSE = [...new Set(DATA.filter(r=>r.dse_code!=='UNASSIGNED').map(r=>r.dse_code))].length;

    <div class="breadcrumb"><span>🏢 ${branchName} — Total Branch</span></div>
    <div class="kpi-section">
      <div class="section-label">Total Performa Branch · ${branchName}</div>

              const rows = DATA.filter(r=>r.micro_cluster===mc);

              return `<tr onclick="selectMC('${mc}')" style="cursor:pointer">
                <td class="mc-name-cell">${mc}</td>

function sumFields(rows) {
  return {
    saldo_mtd: rows.reduce((s,r)=>s+r.saldo_mtd,0),
    saldo_lmtd: rows.reduce((s,r)=>s+r.saldo_lmtd,0),
    sellin_mtd: rows.reduce((s,r)=>s+r.sellin_mtd,0),
    sellin_lmtd: rows.reduce((s,r)=>s+r.sellin_lmtd,0),
    ga_mtd: rows.reduce((s,r)=>s+r.ga_mtd,0),
    ga_lmtd: rows.reduce((s,r)=>s+r.ga_lmtd,0),
    tag_n_go_hit: rows.reduce((s,r)=>s+r.tag_n_go_hit,0),
    biometric_mtd: rows.reduce((s,r)=>s+r.biometric_mtd,0),
    seru_hit: rows.reduce((s,r)=>s+r.seru_hit,0),
    cvm_hit: rows.reduce((s,r)=>s+r.cvm_hit,0),
    unique_participant_program: rows.reduce((s,r)=>s+r.unique_participant_program,0),
  };

function kpiHTML(s) {
  const dSellin = delta(s.sellin_mtd, s.sellin_lmtd);
  const dGA = delta(s.ga_mtd, s.ga_lmtd);

  const dTag = (val) => {
    if(val===null) return `<span class="kpi-sub">vs LMTD</span>`;
    const cls2 = val>=0?'delta-up':'delta-down';
    const sign = val>=0?'▲':'▼';
    return `<span class="${cls2}">${sign} ${Math.abs(val).toFixed(1)}%</span> <span class="kpi-sub">vs LMTD</span>`;
  };

  return `
    <div class="kpi-grid">

// ── DONUT CHART ──────────────────────────────────────────────────────────
function makeDonut(pct, color, trackColor='#1e2842') {
  const r = 48; const circ = 2 * Math.PI * r;
  const filled = Math.min(pct / 100, 1) * circ;
  const gap = circ - filled;
  return `<svg width="120" height="120" viewBox="0 0 120 120">
    <circle cx="60" cy="60" r="${r}" fill="none" stroke="${trackColor}" stroke-width="12"/>
    <circle cx="60" cy="60" r="${r}" fill="none" stroke="${color}" stroke-width="12"
      stroke-dasharray="${filled.toFixed(2)} ${gap.toFixed(2)}"
      stroke-linecap="round"/>
  </svg>`;
}

function colorByPct(pct) {
  if(pct >= 100) return '#10b981';
  if(pct >= 70)  return '#f59e0b';
  return '#ef4444';
}

function donutHTML(rows, allRows) {

  // OSA actual from OSA_DATA

          </div>

// ── CSV UPLOAD ──────────────────────────────────────────────────────────
function handleUpload(event) {
  const file = event.target.files[0];
  if(!file) return;
  if(!file.name.endsWith('.csv')) { showToast('File harus berformat .csv', true); return; }

  const reader = new FileReader();
  reader.onload = e => {
    try {
      const text = e.target.result.replace(/^\uFEFF/, ''); // remove BOM
      const lines = text.split(/\r?\n/).filter(l=>l.trim());
      const sep = lines[0].includes(';') ? ';' : ',';
      const headers = lines[0].split(sep).map(h=>h.trim());

      const numCols = ['saldo_mtd','saldo_lmtd','sellin_mtd','sellin_lmtd','ga_mtd','ga_lmtd',
        'tag_n_go_hit','biometric_mtd','seru_hit','cvm_hit','unique_participant_program'];

      const parsed = [];
      for(let i=1;i<lines.length;i++) {
        const vals = lines[i].split(sep);
        if(vals.length < 5) continue;
        const rec = {};
        headers.forEach((h,idx) => {
          let v = (vals[idx]||'').trim().replace(/"/g,'');
          if(numCols.includes(h)) {
            v = parseFloat(v.replace(',','.')) || 0;
          }
          rec[h] = v;
        });
        if(!rec.micro_cluster) continue;
        if(!rec.dse_code || rec.dse_code==='') rec.dse_code = 'UNASSIGNED';
        parsed.push(rec);
      }

      if(parsed.length === 0) { showToast('Tidak ada data valid ditemukan', true); return; }
      DATA = parsed;
      // Re-extract DSE_MAP from new CSV if it has ID/Nama/Sellin/Salmo columns
      if(headers.includes('ID') && headers.includes('Nama')) {
        const newDseMap = {};
        parsed.forEach(r => {
          if(r.ID && r.ID !== 'UNASSIGNED' && r.ID !== '') {
            if(!newDseMap[r.ID]) {
              newDseMap[r.ID] = {
                nama: r.Nama || '',
                sellin_target: parseFloat(r.Sellin) || 0,
                osa_target: parseFloat(r.Salmo) || 0
              };
            }
          }
        });
        if(Object.keys(newDseMap).length > 0) DSE_MAP = newDseMap;
      }
      OSA_DATA = {};
      selectedMC = null; selectedDSE = null; viewBranch = false;
      buildSidebar();
      renderContent();
      showToast(`✓ Data diperbarui · ${parsed.length} records`);
      // Save to Firestore if admin
      if(isAdmin) saveToFirestore(parsed, DSE_MAP);
    } catch(err) {
      showToast('Gagal memproses file: ' + err.message, true);
    }
    event.target.value = '';
  };
  reader.readAsText(file, 'UTF-8');
}

// ── OSA UPLOAD ──────────────────────────────────────────────────────────
// Supports: outlet_code+osa  OR  Credit Party ID+Amount (Salmo transaction format)
function handleOSAUpload(event) {
  const file = event.target.files[0];
  if(!file) return;
  if(!file.name.endsWith('.csv')) { showToast('File OSA harus berformat .csv', true); return; }

  const reader = new FileReader();
  reader.onload = e => {
    try {
      const text = e.target.result.replace(/^\uFEFF/, '');
      const lines = text.split(/\r?\n/).filter(l=>l.trim());
      const sep = lines[0].includes(';') ? ';' : ',';
      const headers = lines[0].split(sep).map(h=>h.trim());
      const headersLow = headers.map(h=>h.toLowerCase());

      // Detect columns — supports both formats
      let codeIdx = headersLow.findIndex(h => h === 'credit party id');
      let amtIdx  = headersLow.findIndex(h => h === 'amount');
      if(codeIdx === -1) codeIdx = headersLow.findIndex(h => h.includes('outlet_code') || h.includes('outlet code') || h === 'code' || h === 'kode');
      if(amtIdx  === -1) amtIdx  = headersLow.findIndex(h => h.includes('osa') || h.includes('nilai') || h === 'value');

      // Status column for filtering Completed only
      const statusIdx = headersLow.findIndex(h => h.includes('transaction status') || h === 'status');

      if(codeIdx === -1 || amtIdx === -1) {
        showToast('Kolom outlet/amount tidak ditemukan', true); return;
      }

      let count = 0;
      const newOSA = {};
      for(let i=1; i<lines.length; i++) {
        const vals = lines[i].split(sep);
        if(vals.length < 2) continue;
        // Skip non-completed if status column exists
        if(statusIdx !== -1) {
          const status = (vals[statusIdx]||'').trim().replace(/"/g,'').toLowerCase();
          if(status && status !== 'completed') continue;
        }
        const code = (vals[codeIdx]||'').trim().replace(/"/g,'');
        const val  = parseFloat((vals[amtIdx]||'').trim().replace(/"/g,'').replace(',','.'));
        if(code && !isNaN(val) && val > 0) {
          newOSA[code] = (newOSA[code] || 0) + val; // sum per outlet
          count++;
        }
      }

      const uniqueOutlets = Object.keys(newOSA).length;
      if(uniqueOutlets === 0) { showToast('Tidak ada data OSA valid', true); return; }
      OSA_DATA = newOSA;
      renderContent();
      showToast(`💉 OSA diperbarui · ${uniqueOutlets} outlet (${count} transaksi)`);
      // Save to Firestore if admin
      if(isAdmin) saveOSAToFirestore(newOSA);
    } catch(err) {
      showToast('Gagal memproses OSA: ' + err.message, true);
    }
    event.target.value = '';
  };
  reader.readAsText(file, 'UTF-8');
}

// ── FIREBASE AUTH & FIRESTORE ──────────────────────────────────────────
const ADMIN_EMAIL = 'clusternusra@gmail.com';
let isAdmin = false;
let fbReady = false;

function showLoginOverlay() {
  document.getElementById('loginOverlay').classList.add('show');
  document.getElementById('loginErr').textContent = '';
}
function hideLoginOverlay() {
  document.getElementById('loginOverlay').classList.remove('show');
}

function doGoogleLogin() {
  const fb = window._fb;
  if(!fb) { document.getElementById('loginErr').textContent = 'Firebase belum siap, tunggu sebentar...'; return; }
  const provider = new fb.GoogleAuthProvider();
  fb.signInWithPopup(fb.auth, provider)
    .then(result => {
      const email = result.user.email;
      if(email !== ADMIN_EMAIL) {
        fb.signOut(fb.auth);
        document.getElementById('loginErr').textContent = `❌ ${email} tidak terdaftar sebagai admin.`;
      } else {
        hideLoginOverlay();
        showToast('✓ Login sebagai admin');
      }
    })
    .catch(err => {
      document.getElementById('loginErr').textContent = '❌ ' + (err.message || 'Login gagal');
    });
}

function setAdminUI(user) {
  isAdmin = true;
  const authArea = document.getElementById('authArea');
  const adminControls = document.getElementById('adminControls');
  authArea.innerHTML = `<div class="admin-badge">
    ${user.photoURL ? `<img class="admin-avatar" src="${user.photoURL}">` : '👤'}
    <span>${user.displayName || user.email}</span>
    <span class="admin-signout" onclick="doSignOut()" title="Logout">✕</span>
  </div>`;
  adminControls.style.display = 'flex';
}

function setViewerUI() {
  isAdmin = false;
  document.getElementById('authArea').innerHTML = `
    <button class="upload-btn" style="background:rgba(255,255,255,0.08);box-shadow:none;border:1px solid var(--border)" onclick="showLoginOverlay()">
      🔑 Admin
    </button>`;
  document.getElementById('adminControls').style.display = 'none';
}

function doSignOut() {
  const fb = window._fb;
  if(fb) fb.signOut(fb.auth).then(() => showToast('Signed out'));
}

// ── FIRESTORE SYNC ──────────────────────────────────────────────────────
function initFirestore() {
  const fb = window._fb;
  if(!fb) return;
  fbReady = true;
  document.getElementById('syncBadge').style.display = 'flex';

  // Listen realtime to dashboard_data/main
  fb.onSnapshot(fb.doc(fb.db, 'dashboard_data', 'main'), snap => {
    if(snap.exists()) {
      const d = snap.data();
      if(d.records && d.records.length > 0) {
        DATA = d.records;
        if(d.dse_map) DSE_MAP = d.dse_map;
        updateHeaderSub();
        buildSidebar();
        renderContent();
        const ts = d.updatedAt ? new Date(d.updatedAt.toDate()).toLocaleString('id-ID') : '';
        if(ts) document.getElementById('syncBadge').title = 'Update terakhir: ' + ts;
      }
    }
  });

  // Listen realtime to dashboard_data/osa
  fb.onSnapshot(fb.doc(fb.db, 'dashboard_data', 'osa'), snap => {
    if(snap.exists()) {
      const d = snap.data();
      if(d.osa_data) {
        OSA_DATA = d.osa_data;
        renderContent();
        const ts = d.updatedAt ? new Date(d.updatedAt.toDate()).toLocaleString('id-ID') : '';
        if(ts) showToast('💉 OSA diperbarui: ' + ts);
      }
    }
  });

  // Auth state
  fb.onAuthStateChanged(fb.auth, user => {
    if(user && user.email === ADMIN_EMAIL) {
      setAdminUI(user);
    } else {
      setViewerUI();
    }
  });
}

// Save to Firestore after CSV upload (admin only)
async function saveToFirestore(records, dseMap) {
  const fb = window._fb;
  if(!fb || !isAdmin) return;
  try {
    await fb.setDoc(fb.doc(fb.db, 'dashboard_data', 'main'), {
      records,
      dse_map: dseMap,
      updatedAt: fb.serverTimestamp(),
      uploadedBy: fb.auth.currentUser?.email || 'admin'
    });
    showToast('☁️ Data tersimpan ke cloud');
  } catch(e) {
    showToast('❌ Gagal simpan: ' + e.message, true);
  }
}

// Save OSA to Firestore after OSA upload (admin only)
async function saveOSAToFirestore(osaData) {
  const fb = window._fb;
  if(!fb || !isAdmin) return;
  try {
    await fb.setDoc(fb.doc(fb.db, 'dashboard_data', 'osa'), {
      osa_data: osaData,
      updatedAt: fb.serverTimestamp(),
      uploadedBy: fb.auth.currentUser?.email || 'admin'
    });
    showToast('☁️ OSA tersimpan ke cloud');
  } catch(e) {
    showToast('❌ Gagal simpan OSA: ' + e.message, true);
  }
}

// Wait for Firebase module to load, then init
function waitForFirebase() {
  if(window._fb) {
    initFirestore();
  } else {
    setTimeout(waitForFirebase, 200);
  }
}

// ── MOBILE NAV ──────────────────────────────────────────────────────────
function isMobile() { return window.innerWidth <= 768; }

function mobileNav(tab) {
  if(tab === 'branch') {
    viewBranch = true; selectedMC = null; selectedDSE = null;
  } else if(tab === 'overview') {
    viewBranch = false; selectedMC = null; selectedDSE = null;
  }
  updateBottomNav();
  buildSidebar();
  renderContent();
  window.scrollTo({top:0, behavior:'smooth'});
}

function updateBottomNav() {
  if(!isMobile()) return;
  const branchBtn   = document.getElementById('bnav-branch');
  const overviewBtn = document.getElementById('bnav-overview');
  if(!branchBtn) return;
  branchBtn.classList.toggle('active', viewBranch);
  overviewBtn.classList.toggle('active', !viewBranch && !selectedMC && !selectedDSE);
}

function openDrawer() {
  buildDrawer();
  document.getElementById('drawerBackdrop').classList.add('show');
  document.getElementById('drawer').classList.add('show');
}

function closeDrawer() {
  document.getElementById('drawerBackdrop').classList.remove('show');
  document.getElementById('drawer').classList.remove('show');
}

function buildDrawer() {
  const mcs = [...new Set(DATA.map(r => r.micro_cluster))].sort();
  const branchName = getBranchName();
  let html = '';

  mcs.forEach(mc => {
    const dses = [...new Set(DATA.filter(r => r.micro_cluster===mc && r.dse_code !== 'UNASSIGNED').map(r=>r.dse_code))].sort();
    const isActiveMC = selectedMC === mc;
    html += `<button class="drawer-mc-btn ${isActiveMC?'active':''}" onclick="drawerSelectMC('${mc}')">
      <span>${mc}</span>
      <span class="mc-badge">${dses.length} DSE</span>
    </button>`;
    if(isActiveMC) {
      html += `<div class="drawer-dse-list">`;
      dses.forEach(dse => {
        const info = DSE_MAP[dse];
        const nama = info && info.nama && info.nama !== 'nan' ? info.nama : '';
        const isActiveDSE = selectedDSE === dse;
        html += `<button class="drawer-dse-btn ${isActiveDSE?'active':''}" onclick="drawerSelectDSE('${dse}')">
          ${nama ? `<span style="font-size:0.85rem;font-weight:600;color:var(--text)">${nama}</span>
          <span style="font-size:0.68rem;color:var(--muted);font-family:JetBrains Mono,monospace">${dse}</span>`
          : `<span style="font-size:0.85rem;font-weight:600;color:var(--text)">${dse}</span>`}
        </button>`;
      });
      html += `</div>`;
    }
  });

  document.getElementById('drawerContent').innerHTML = html;
}

function drawerSelectMC(mc) {
  viewBranch = false;
  selectedMC = mc;
  selectedDSE = null;
  closeDrawer();
  updateBottomNav();
  buildSidebar();
  renderContent();
  window.scrollTo({top:0, behavior:'smooth'});
}

function drawerSelectDSE(dse) {
  selectedDSE = dse;
  closeDrawer();
  updateBottomNav();
  buildSidebar();
  renderContent();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ── INIT ──────────────────────────────────────────────────────────────
buildSidebar();
renderContent();
updateBottomNav();
// Update branch label in bottom nav
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    const el = document.getElementById('bnav-branch-label');

waitForFirebase();
